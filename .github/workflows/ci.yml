name: CI

on:
  pull_request:
    branches: [main]
  push:
    branches: [main]

# Канселим устаревшие запуски на тот же PR/ветку.
concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  lint-and-typecheck:
    name: Lint + Typecheck + Audit
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v5

      - uses: actions/setup-node@v5
        with:
          node-version: "24"
          cache: npm

      - name: Install deps (reproducible)
        run: npm ci

      - name: Lint
        # TODO: убрать continue-on-error когда закроем задачу #53
        # (@ts-nocheck cleanup + 480 ESLint errors с no-explicit-any).
        # Сейчас non-blocking — иначе все PR'ы красные с первого дня.
        continue-on-error: true
        run: npm run lint

      - name: Typecheck
        run: npx tsc --noEmit

      - name: npm audit (high)
        # Падаем только на HIGH/CRITICAL уязвимостях. moderate/low — варнинг.
        # Для public репо advisory database работает без токенов.
        run: npm audit --audit-level=high
