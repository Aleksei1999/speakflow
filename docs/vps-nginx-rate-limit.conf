# nginx rate-limit и базовый WAF для VPS-прокси перед Vercel.
# Подкатить на VPS Москва (94.156.131.116).
#
# Куда вставлять:
#   1. В /etc/nginx/nginx.conf — секция http { } (две limit_req_zone директивы)
#   2. В server { } секцию raw-english.com — limit_req / map rules
#   3. После правок: sudo nginx -t && sudo systemctl reload nginx

# ─────────────────────────────────────────────────────────────────────
# 1. ZONES в http { }
# ─────────────────────────────────────────────────────────────────────
# Размеры зон: 10m ≈ 160k уникальных ключей. Под наш трафик хватит.

# Общая зона на весь трафик (защита от sustained DoS).
limit_req_zone $binary_remote_addr zone=general:10m rate=120r/m;   # 2 r/s

# Auth-эндпоинты — login/register/forgot/reset.
limit_req_zone $binary_remote_addr zone=auth:10m rate=10r/m;       # 1 раз в 6 сек

# Payments — низкие лимиты, потому что fail = double-charge risk.
limit_req_zone $binary_remote_addr zone=payments:10m rate=5r/m;

# Recording chunks — высокие, потому что один урок = ~150 chunk-url + 150 PUT.
limit_req_zone $binary_remote_addr zone=recording:10m rate=300r/m;

# Admin — должно быть редко, выше показатель = сигнал атаки.
limit_req_zone $binary_remote_addr zone=admin:10m rate=30r/m;

# ─────────────────────────────────────────────────────────────────────
# 2. BLOCK SCANNERS на уровне map
# ─────────────────────────────────────────────────────────────────────
# Блокируем популярные сканер-User-Agent'ы. Не helpful'ы (Googlebot и т.д.),
# а явные тулы.
map $http_user_agent $bad_bot {
    default 0;
    ~*(nikto|sqlmap|nessus|nmap|masscan|zgrab|wpscan)  1;
    ~*(libwww-perl|python-requests/[12]\.) 1;
    ""  1;  # пустой UA — обычно скрипт-кидди
}

