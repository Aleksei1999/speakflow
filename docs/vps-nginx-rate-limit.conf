# Включить:    sudo nginx -t && sudo systemctl reload nginx
# Проверить:   curl -I https://raw-english.com/api/auth/login (15 раз подряд)
#              на 11-м должно появиться 429.
# Логи блоков: tail -f /var/log/nginx/error.log | grep limit
