# GitHub secret-scanning исключения.
#
# Файлы в __tests__/ содержат fake-values чтобы проверить scrub-regex
# работает. Они не настоящие секреты — никогда не использовались
# в проде, не выдавались провайдерами. Если scanner на них реагирует —
# это false positive по определению (test bait).
paths-ignore:
  - "**/__tests__/**"
  - "**/*.test.ts"
  - "**/*.test.tsx"
  - "**/*.spec.ts"
